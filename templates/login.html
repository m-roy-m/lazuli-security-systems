<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lazuli Ltd. — Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="card">

    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Lazuli Ltd.</h1>
      <p class="subtitle">Security Systems Portal</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-section" class="form-section active">
      <form method="POST" action="/login">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" placeholder="Enter your username" required />

        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" placeholder="Enter your password" required />

        <button class="btn" type="submit">Sign in</button>
      </form>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </div>

    <!-- REGISTER FORM -->
    <div id="register-section" class="form-section">
      <form method="POST" action="/register">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" name="username" placeholder="Choose a username" required />

        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="Choose a password" required />

        <label for="reg-confirm">Confirm password</label>
        <input type="password" id="reg-confirm" name="confirm_password" placeholder="Re-enter your password" required />

        <button class="btn" type="submit">Create account</button>
      </form>

      {% if reg_error %}
        <div class="error">{{ reg_error }}</div>
      {% endif %}

      {% if reg_success %}
        <div class="success">{{ reg_success }}</div>
      {% endif %}

      <div class="notice">New accounts require admin approval before you can sign in.</div>
    </div>

  </div>

  <span id="show-register" data-show="{{ 'true' if (reg_error or reg_success) else 'false' }}" style="display:none;"></span>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
